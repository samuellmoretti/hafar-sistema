<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HAFAR Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/pt-br.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    min-height:100vh;
}

.sidebar {
    width:220px;
    position:fixed;
    height:100%;
    background:#111;
    padding-top:20px;
    box-shadow:4px 0 15px rgba(0,0,0,0.5);
}

.sidebar a {
    display:block;
    color:#ccc;
    padding:15px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover {
    background:#0d6efd;
    color:white;
    transform:translateX(5px);
}

.content {
    margin-left:230px;
    padding:30px;
}

.card-custom {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card-custom:hover {
    transform:translateY(-5px);
}

button {
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center text-white">HAFAR</h4>
    <a href="/dashboard">Dashboard</a>
    <a href="/contratos">Contratos</a>
    <a href="/preventiva">Preventiva</a>
    <a href="/corretiva">Corretiva</a>
    <a href="/visita_tecnica">Visita Técnica</a>
    <a href="/relatorio_pdf" class="nav-link">📄 Relatório PDF</a>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
